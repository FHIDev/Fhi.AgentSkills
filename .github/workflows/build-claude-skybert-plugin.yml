name: Build Claude Skybert plugin

# Genererer Claude Code-plugin-strukturen fra innholdet i /skybert.
# Kjorer ved push til main som rorer skybert/ eller denne workflowen,
# og kan startes manuelt med workflow_dispatch.

on:
  push:
    branches:
      - main
    paths:
      - "skybert/**"
      - ".github/workflows/build-claude-skybert-plugin.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-skybert-plugin:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Bygg plugin-struktur
        shell: bash
        run: |
          set -euo pipefail

          SOURCE_SKILL="skybert"
          PLUGIN_ROOT="plugins/skybert-plugin"
          SKILL_TARGET="$PLUGIN_ROOT/skills/skybert"

          if [ ! -f "$SOURCE_SKILL/SKILL.md" ]; then
            echo "Fant ikke $SOURCE_SKILL/SKILL.md"
            exit 1
          fi

          # Regenerer hele plugin-mappa fra kilden
          rm -rf "$PLUGIN_ROOT"
          mkdir -p "$PLUGIN_ROOT/.claude-plugin"
          mkdir -p "$SKILL_TARGET"
          mkdir -p ".claude-plugin"

          # Kopier skill-innholdet, men ta ikke med intern vedlikeholds-state
          cp -R "$SOURCE_SKILL/." "$SKILL_TARGET/"
          rm -f "$SKILL_TARGET/.oppdater-state.json"

          cat > "$PLUGIN_ROOT/.claude-plugin/plugin.json" <<'JSON'
          {
            "name": "skybert-plugin",
            "description": "Skybert-skill: FHI sin Kubernetes-plattform (GitOps, SkybertApp CRD, Flux, Workload Identity).",
            "author": {
              "name": "Folkehelseinstituttet"
            },
            "repository": "https://github.com/FHIDev/Fhi.AgentSkills"
          }
          JSON

          cat > ".claude-plugin/marketplace.json" <<'JSON'
          {
            "name": "fhi-agent-skills",
            "owner": {
              "name": "Folkehelseinstituttet"
            },
            "description": "FHI Agent Skills for Claude Code",
            "plugins": [
              {
                "name": "skybert-plugin",
                "source": "./plugins/skybert-plugin",
                "description": "Skybert-skill: FHI sin Kubernetes-plattform (GitOps, SkybertApp CRD, Flux, Workload Identity)."
              }
            ]
          }
          JSON

      - name: Commit genererte plugin-filer
        shell: bash
        run: |
          set -euo pipefail

          # Stage forst slik at nye/untrackede filer telles med
          git add .claude-plugin/marketplace.json plugins/skybert-plugin

          if git diff --cached --quiet; then
            echo "Ingen plugin-endringer a committe."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git commit -m "Bygg Claude-plugin for Skybert-skill"
          git push
