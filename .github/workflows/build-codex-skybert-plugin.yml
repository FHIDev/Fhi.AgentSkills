name: Build Codex Skybert plugin

# Genererer Codex-plugin-strukturen fra innholdet i /skybert.
# Codex forventer skill under skills/<navn>/, saa her trengs en generert kopi
# (i motsetning til Claude-pluginen som distribueres direkte fra skybert/).

on:
  push:
    branches:
      - main
    paths:
      - "skybert/**"
      - ".github/workflows/build-codex-skybert-plugin.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-codex-skybert-plugin:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Bygg Codex-plugin-struktur
        shell: bash
        run: |
          set -euo pipefail

          SOURCE_SKILL="skybert"
          CODEX_PLUGIN_ROOT="plugins/codex/skybert-plugin"
          CODEX_SKILL_TARGET="$CODEX_PLUGIN_ROOT/skills/skybert"

          if [ ! -f "$SOURCE_SKILL/SKILL.md" ]; then
            echo "Fant ikke $SOURCE_SKILL/SKILL.md"
            exit 1
          fi

          rm -rf "$CODEX_PLUGIN_ROOT"
          mkdir -p "$CODEX_PLUGIN_ROOT/.codex-plugin"
          mkdir -p "$CODEX_SKILL_TARGET"
          mkdir -p ".agents/plugins"

          # Kopier skill-innholdet, men ekskluder Claude-metadata og intern sync-state
          rsync -a \
            --exclude ".claude-plugin/" \
            --exclude ".oppdater-state.json" \
            "$SOURCE_SKILL/" "$CODEX_SKILL_TARGET/"

          cat > "$CODEX_PLUGIN_ROOT/.codex-plugin/plugin.json" <<'JSON'
          {
            "name": "skybert-plugin",
            "version": "0.1.0",
            "description": "Codex-plugin med Skybert-skill.",
            "skills": "./skills",
            "author": {
              "name": "Folkehelseinstituttet"
            },
            "repository": "https://github.com/FHIDev/Fhi.AgentSkills"
          }
          JSON

          cat > ".agents/plugins/marketplace.json" <<'JSON'
          {
            "name": "fhi-agent-skills",
            "interface": {
              "displayName": "FHI Agent Skills"
            },
            "plugins": [
              {
                "name": "skybert-plugin",
                "source": {
                  "source": "local",
                  "path": "./plugins/codex/skybert-plugin"
                },
                "policy": {
                  "installation": "AVAILABLE",
                  "authentication": "ON_INSTALL"
                },
                "category": "Productivity"
              }
            ]
          }
          JSON

      - name: Valider JSON
        shell: bash
        run: |
          set -euo pipefail
          python3 -m json.tool ".agents/plugins/marketplace.json" > /dev/null
          python3 -m json.tool "plugins/codex/skybert-plugin/.codex-plugin/plugin.json" > /dev/null
          [ -f "plugins/codex/skybert-plugin/skills/skybert/SKILL.md" ] || { echo "Mangler generert SKILL.md"; exit 1; }
          if [ -d "plugins/codex/skybert-plugin/skills/skybert/.claude-plugin" ]; then
            echo "Claude-metadata ble feilaktig kopiert inn"; exit 1
          fi
          echo "OK validering"

      - name: Commit genererte Codex-plugin-filer
        shell: bash
        run: |
          set -euo pipefail

          # Stage forst slik at nye/untrackede filer telles med
          git add .agents/plugins/marketplace.json plugins/codex/skybert-plugin

          if git diff --cached --quiet; then
            echo "Ingen Codex-plugin-endringer a committe."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git commit -m "Bygg Codex-plugin for Skybert-skill"
          git push
